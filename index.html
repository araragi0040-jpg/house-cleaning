<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f5f7a" />
  <title>CleanFlow v007</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-brand"><div class="brand-mark">CF</div><div><strong>CleanFlow</strong><small>清掃業務管理</small></div></div>
      <div>
        <h1>ログイン</h1>
        <p id="loginDescription">クラウド上の案件と作業情報を確認します。</p>
      </div>
      <form id="loginForm" class="login-form">
        <label>ログインID<input id="loginId" class="form-control" autocomplete="username" required></label>
        <label>PIN<input id="loginPin" class="form-control" type="password" inputmode="numeric" autocomplete="current-password" required></label>
        <p id="loginError" class="login-error" hidden></p>
        <button id="loginButton" class="primary-btn" type="submit">ログイン</button>
      </form>
      <div id="demoLoginHelp" class="demo-login-help">
        <b>デモ用アカウント</b>
        <span>管理者：admin / 1234</span>
        <span>スタッフ：yamada / 1111</span>
      </div>
      <p id="loginModeLabel" class="login-mode-label"></p>
    </div>
  </section>

  <div id="app" class="app-shell" hidden>
    <aside class="sidebar" aria-label="管理メニュー">
      <div class="brand">
        <div class="brand-mark">CF</div>
        <div>
          <strong>CleanFlow</strong>
          <small>清掃業務管理</small>
        </div>
      </div>

      <nav id="adminNav" class="nav-list">
        <button class="nav-item active" data-view="dashboard"><span>⌂</span>ホーム</button>
        <button class="nav-item" data-view="calendar"><span>▦</span>カレンダー</button>
        <button class="nav-item" data-view="jobs"><span>▤</span>案件</button>
        <button class="nav-item" data-view="billing"><span>¥</span>請求・支払</button>
        <button class="nav-item" data-view="manuals"><span>▧</span>手順書</button>
        <button class="nav-item" data-view="settings"><span>⚙</span>設定</button>
      </nav>

      <div class="sidebar-bottom">
        <button id="modeSwitch" class="mode-switch" type="button">
          <span class="mode-icon">▣</span>
          <span><b>スタッフ画面へ</b><small>表示を切り替え</small></span>
        </button>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <button id="mobileMenuBtn" class="icon-btn mobile-only" aria-label="メニューを開く">☰</button>
        <div class="topbar-title">
          <h1 id="pageTitle">ホーム</h1>
          <p id="pageSubtitle">今日の状況と対応事項を確認します</p>
        </div>
        <div class="topbar-actions">
          <button id="syncStatus" class="sync-status" type="button" title="最新データに更新"><i></i><span>接続確認中</span></button>
          <span id="todayLabel" class="date-label"></span>
          <button id="addJobTop" class="primary-btn">＋ 案件追加</button>
          <button id="userMenuButton" class="user-menu-button" type="button" aria-label="ログアウト"><span id="userInitial">管</span><b id="userName">管理者</b></button>
        </div>
      </header>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <div id="mobileOverlay" class="mobile-overlay"></div>
  <div id="toast" class="toast" role="status"></div>

  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <section id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"></section>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
